# This rule is not used by the project certupload itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the aliyun.weyundong.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: certupload
    app.kubernetes.io/managed-by: kustomize
  name: certupload-editor-role
rules:
- apiGroups:
  - aliyun.weyundong.com
  resources:
  - certuploads
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - aliyun.weyundong.com
  resources:
  - certuploads/status
  verbs:
  - get
