              accessKeySecretRef:
                description: |-
                  AccessKeySecretRef is a reference to a Secret containing the Aliyun Access Key Secret.
                  The Secret must contain a key named "accessKeySecret".
                properties:
                  key:
                    description: Key in the Secret's data to use.
                    minLength: 1
                    type: string
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Secret. If empty, defaults to the
                      namespace of the CertUpload resource.
                    type: string
                required:
                - key
                - name
                type: object
              cdn:
                description: |-
                  CDN is the optional CDN domain SSL certificate configuration.
                  If set, the controller will update the CDN domain SSL certificate.
                properties:
                  domain:
                    description: Domain is the CDN accelerated domain name for which
                      the SSL certificate should be configured.
                    minLength: 1
                    type: string
                required:
                - domain
                type: object
              certManagerCertRef:
                description: CertManagerCertRef is a reference to the cert-manager
