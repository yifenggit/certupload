                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              errorMessage:
                description: ErrorMessage contains a human-readable error message
                  if the last sync failed.
                type: string
              lastSyncTime:
                description: LastSyncTime is the timestamp when the certificate was
                  last successfully synchronized to Aliyun.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the most recent generation observed
                  by the controller.
                format: int64
                type: integer
              ossErrorMessage:
                description: OSSErrorMessage contains the error message if the last
                  OSS sync failed.
                type: string
              ossLastSyncTime:
                description: OSSLastSyncTime is the timestamp when the OSS domain
                  certificate was last updated.
                format: date-time
                type: string
              ossStatus:
                description: 'OSSStatus indicates the last OSS sync result: Succeeded,
