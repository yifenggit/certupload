                properties:
                  name:
                    description: Name of the Certificate resource.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Certificate resource. If empty,
                      defaults to the namespace of the CertUpload resource.
                    type: string
                required:
                - name
                type: object
              oss:
                description: |-
                  OSS is the optional OSS domain certificate configuration.
                  If set, the controller will update the OSS bucket domain certificate.
                properties:
                  bucket:
                    description: Bucket is the name of the OSS bucket where the domain
                      certificate should be updated.
                    minLength: 1
                    type: string
                  domain:
                    description: Domain is the domain name for the OSS bucket certificate
