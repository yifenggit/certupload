  name: certuploads.aliyun.weyundong.com
spec:
  group: aliyun.weyundong.com
  names:
    kind: CertUpload
    listKind: CertUploadList
    plural: certuploads
    shortNames:
    - cu
    - cupload
    singular: certupload
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .status.ossStatus
      name: OSS Status
      type: string
    - jsonPath: .status.cdnStatus
      name: CDN Status
      type: string
    - jsonPath: .status.lastSyncTime
      name: Last Sync
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: CertUpload is the Schema for the certuploads API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: CertUploadSpec defines the desired state of CertUpload
            properties:
              accessKeyIdRef:
                description: |-
                  AccessKeyIDRef is a reference to a Secret containing the Aliyun Access Key ID.
                  The Secret must contain a key named "accessKeyId".
                properties:
                  key:
                    description: Key in the Secret's data to use.
                    minLength: 1
                    type: string
                  name:
                    description: Name of the Secret.
                    minLength: 1
                    type: string
                  namespace:
                    description: Namespace of the Secret. If empty, defaults to the
                      namespace of the CertUpload resource.
                    type: string
                required:
                - key
                - name
